name: MessageBucket
options:
  bundleIdPrefix: com.milanvanbruggen
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.milanvanbruggen.messagebucket
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_NAME: "Message Bucket"

targets:
  MessageBucket:
    type: application
    platform: macOS
    sources:
      - MessageBucket
    settings:
      base:
        INFOPLIST_FILE: MessageBucket/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MessageBucket/Resources/MessageBucket.entitlements
        ENABLE_HARDENED_RUNTIME: YES
